<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#c98f7b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="just decision!" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>JUST DECISION!</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase.js"></script>
  </head>
  <body>
    <div class="splash" id="splash" aria-hidden="true">
      <div class="dice-wrap" id="splashStage">
        <div class="dice-cube" id="splashCube">
          <div class="cube-face face-1"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
          <div class="cube-face face-2"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
          <div class="cube-face face-3"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
          <div class="cube-face face-4"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
          <div class="cube-face face-5"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
          <div class="cube-face face-6"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
        </div>
      </div>
      <div class="splash-title-wrap" id="splashTitleWrap">
        <div class="splash-title" id="splashTitle">JUST DECISION!</div>
        <svg class="brush-stroke" viewBox="0 0 300 20" preserveAspectRatio="none">
          <path d="M10,10 Q80,2 150,8 T290,10" fill="none" stroke="var(--clay)" stroke-width="4" stroke-linecap="round" stroke-dasharray="300" stroke-dashoffset="300" />
        </svg>
      </div>
    </div>
    <main class="app-shell">
      <section class="hero-panel">
        <div class="topbar">
          <div class="topbar-left">
            <div class="user-badge" id="userBadge">
              <span class="user-dot" id="userDot">○</span>
              <span class="user-label" id="userLabel">登录同步</span>
            </div>
            <h1>JUST DECISION!</h1>
          </div>
          <div class="topbar-actions">
            <div class="account-panel" id="accountPanel">
              <div class="account-panel-inner">
                <div class="account-state" id="accountLoggedOut">
                  <p class="account-hint">登录后数据同步到云端</p>
                  <input type="email" id="accountEmail" placeholder="邮箱" autocomplete="email" />
                  <input type="password" id="accountPassword" placeholder="密码（至少6位）" autocomplete="current-password" minlength="6" />
                  <p class="account-error" id="accountError"></p>
                  <div class="account-buttons">
                    <button class="mini-roll" id="accountSignUp" type="button">注册</button>
                    <button class="mini-roll secondary" id="accountLogIn" type="button">登录</button>
                  </div>
                </div>
                <div class="account-state" id="accountLoggedIn" style="display:none">
                  <div class="account-avatar" id="accountAvatar"></div>
                  <input type="text" class="account-nickname" id="accountNickname" placeholder="设置昵称" maxlength="20" />
                  <p class="account-email" id="accountEmailDisplay"></p>
                  <hr />
                  <button class="account-link" id="accountHistoryBtn">历史记录</button>
                  <button class="account-link" id="accountSettingsBtn">骰子设置</button>
                  <hr />
                  <button class="account-link danger" id="accountLogoutBtn">退出登录</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="dice-stage" aria-live="polite">
          <div class="dice-wrap">
            <div class="dice-cube" id="dice" data-value="1">
              <div class="cube-face face-1"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
              <div class="cube-face face-2"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
              <div class="cube-face face-3"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
              <div class="cube-face face-4"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
              <div class="cube-face face-5"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
              <div class="cube-face face-6"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
            </div>
          </div>
          <p id="decisionText">先写下你正在纠结什么，再摇一下。</p>
          <p class="encouragement" id="encouragementText"></p>
        </div>

      </section>

      <section class="today-panel">
        <div class="panel-header">
          <h2>今天的纠结</h2>
          <span id="todayCount">0 次</span>
        </div>
        <div class="today-list" id="todayList"></div>
      </section>

      <section class="heatmap-panel">
        <div class="panel-header">
          <h2>摇骰热力图</h2>
        </div>
        <div class="heatmap-body">
          <div class="heatmap-weeks">
            <span style="grid-row:1">一</span><span style="grid-row:3">三</span><span style="grid-row:5">五</span><span style="grid-row:7">日</span>
          </div>
          <div class="heatmap-main">
            <div class="heatmap-months" id="heatmapMonths"></div>
            <div class="heatmap" id="heatmap" aria-label="每天摇骰次数热力图"></div>
          </div>
        </div>
      </section>

      <section class="calendar-panel">
        <div class="panel-header">
          <h2>结果日历</h2>
          <div class="month-controls">
            <button class="mini-button" id="prevMonthButton" type="button" aria-label="上个月">‹</button>
            <strong id="monthLabel"></strong>
            <button class="mini-button" id="nextMonthButton" type="button" aria-label="下个月">›</button>
          </div>
        </div>
        <div class="weekday-row" aria-hidden="true">
          <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
        </div>
        <div class="calendar-grid" id="calendarGrid" aria-label="按日期展示摇骰结果"></div>
      </section>

      <section class="prompt-modal" id="promptModal" aria-hidden="true">
        <div class="prompt-card" role="dialog" aria-modal="true" aria-labelledby="promptTitle">
          <div class="panel-header">
            <h2 id="promptTitle">今日又纠结什么了</h2>
            <button class="icon-button" id="closePromptButton" type="button" aria-label="关闭">×</button>
          </div>
          <label class="prompt-field">
            <textarea id="questionInput" rows="4" placeholder="比如：今晚要不要出门？这件衣服买不买？"></textarea>
          </label>
          <button class="roll-button" id="rollButton" type="button">写好了，开摇</button>
        </div>
      </section>

      <section class="prompt-modal" id="settingsModal" aria-hidden="true">
        <div class="prompt-card" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
          <div class="panel-header">
            <h2 id="settingsTitle">每个点数代表什么</h2>
            <button class="icon-button" id="closeSettingsButton" type="button" aria-label="关闭">×</button>
          </div>
          <div class="meaning-grid" id="meaningGrid"></div>
          <button class="roll-button" id="saveSettingsButton" type="button">保存</button>
        </div>
      </section>

      <section class="prompt-modal" id="historyModal" aria-hidden="true">
        <div class="prompt-card history-card" role="dialog" aria-modal="true" aria-labelledby="historyTitle">
          <div class="panel-header">
            <h2 id="historyTitle">历史记录</h2>
            <button class="icon-button" id="closeHistoryButton" type="button" aria-label="关闭">×</button>
          </div>
          <p class="history-hint">右滑复原 · 左滑彻底删除</p>
          <div class="history-list" id="historyList"></div>
          <div class="history-empty" id="historyEmpty">没有已删除的记录</div>
        </div>
      </section>

      <section class="prompt-modal" id="dayModal" aria-hidden="true">
        <div class="prompt-card day-modal-card" role="dialog" aria-modal="true" aria-labelledby="dayModalTitle">
          <div class="panel-header">
            <h2 id="dayModalTitle"></h2>
            <button class="icon-button" id="closeDayButton" type="button" aria-label="关闭">×</button>
          </div>
          <div class="day-modal-list" id="dayModalList"></div>
          <div class="day-modal-empty" id="dayModalEmpty">这一天没有记录</div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        var hadController = !!navigator.serviceWorker.controller;
        navigator.serviceWorker.register("sw.js");
        navigator.serviceWorker.addEventListener("message", function (event) {
          if (event.data && event.data.type === "update" && hadController) {
            window.location.reload();
          }
        });
      }
    </script>
  </body>
</html>
